<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mecca · Phone header options</title>
<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="14" fill="#f0eee9"/><rect x="22" y="20" width="22" height="60" rx="4" fill="#1a1a1f"/><rect x="56" y="20" width="22" height="60" rx="4" fill="#1a1a1f"/><rect x="26" y="28" width="14" height="6" rx="1" fill="#e8e6df"/><rect x="60" y="28" width="6" height="2" rx="1" fill="#8a7355"/></svg></template>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="phone-styles.css">
<link rel="stylesheet" href="phone-header-styles.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="phone-header-variants.jsx"></script>

<script type="text/babel" data-presets="env,react">
document.documentElement.setAttribute('data-theme', 'dark');

const PHONE_W = 390;
const PHONE_H = 844;
// IOSDevice adds bezel/notch chrome; outer dims are slightly larger than the
// content area, but DCArtboard auto-fits. We size the artboard generously.
const ART_W = PHONE_W;
const ART_H = PHONE_H;

function PhoneInFrame({ children }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: '#1a1a1f',
    }}>
      <IOSDevice width={PHONE_W} height={PHONE_H} dark={true}>
        <div style={{
          height: '100%', display: 'flex', flexDirection: 'column',
          paddingTop: 60, boxSizing: 'border-box', background: 'var(--mc-bg-app)',
        }}>
          <div style={{ flex: 1, minHeight: 0, position: 'relative' }}>
            {children}
          </div>
        </div>
      </IOSDevice>
    </div>
  );
}

function CaptionCard({ children, height }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      padding: '32px 32px 24px',
      boxSizing: 'border-box',
      background: '#fffaf0',
      display: 'flex', flexDirection: 'column',
    }}>
      {children}
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      {/* Intro / reasoning */}
      <DCSection
        id="intro"
        title="Module header — should we keep the big title?"
        subtitle="Procurement module compared across three header treatments"
      >
        <DCArtboard id="reasoning" label="Reasoning" width={420} height={ART_H + 60}
          style={{background: '#fffaf0'}}>
          <CaptionCard>
            <div style={{fontSize: 11, fontWeight: 700, letterSpacing: '0.1em',
              textTransform: 'uppercase', color: '#8a7355', marginBottom: 18,
              fontFamily: 'Inter, system-ui'}}>The question</div>
            <h2 style={{fontFamily: 'Inter, system-ui', fontSize: 22, fontWeight: 600,
              letterSpacing: '-0.018em', margin: '0 0 14px', color: '#1a1209',
              lineHeight: 1.25}}>
              The big "Procurement" title eats ~70px of a 844px screen.
              Is it earning that space?
            </h2>
            <p style={{fontFamily: 'Inter, system-ui', fontSize: 13.5, lineHeight: 1.55,
              color: '#2d2418', margin: '0 0 14px'}}>
              The bottom modnav pill already indicates which module is active.
              So the 28px h1 is partly redundant — but it does anchor the screen
              and gives a clear hierarchy. The subtitle ("3 waiting approval") is
              doing real work though.
            </p>
            <div style={{height: 1, background: '#e5dbc7', margin: '6px 0 14px'}}/>
            <div style={{fontSize: 11, fontWeight: 700, letterSpacing: '0.1em',
              textTransform: 'uppercase', color: '#8a7355', marginBottom: 10,
              fontFamily: 'Inter, system-ui'}}>Three options →</div>
            <ul style={{fontFamily: 'Inter, system-ui', fontSize: 13, lineHeight: 1.55,
              color: '#2d2418', margin: 0, paddingLeft: 18}}>
              <li style={{marginBottom: 8}}>
                <b>A. Original.</b> Keep the big title. Familiar but spendy.
              </li>
              <li style={{marginBottom: 8}}>
                <b>B. Collapsing.</b> Big title at rest, shrinks to a 17px
                inline title in a sticky bar on scroll. iOS native pattern.
              </li>
              <li>
                <b>C. Compact.</b> No big title. A single eyebrow strip carries
                the count and the contextual badge.
              </li>
            </ul>
            <div style={{
              marginTop: 'auto', paddingTop: 16,
              fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: '#8a7355',
              borderTop: '1px solid #e5dbc7',
            }}>
              <b style={{color: '#2d2418'}}>tip:</b> scroll inside phone B to see
              the title collapse →
            </div>
          </CaptionCard>
        </DCArtboard>
      </DCSection>

      {/* The three variants */}
      <DCSection
        id="variants"
        title="Compare side-by-side"
        subtitle="Same content, same modnav — only the header changes"
      >
        <DCArtboard id="opt-a" label="A · Original (28px h1 + sub)"
          width={ART_W} height={ART_H}>
          <PhoneInFrame><HXVariantOriginal /></PhoneInFrame>
        </DCArtboard>

        <DCArtboard id="opt-b-expanded" label="B · Collapsing — at rest"
          width={ART_W} height={ART_H}>
          <PhoneInFrame><HXVariantCollapsing initialScroll={0} /></PhoneInFrame>
        </DCArtboard>

        <DCArtboard id="opt-b-collapsed" label="B · Collapsing — after scroll"
          width={ART_W} height={ART_H}>
          <PhoneInFrame><HXVariantCollapsing initialScroll={120} /></PhoneInFrame>
        </DCArtboard>

        <DCArtboard id="opt-c" label="C · Compact (subtitle-only)"
          width={ART_W} height={ART_H}>
          <PhoneInFrame><HXVariantCompact /></PhoneInFrame>
        </DCArtboard>
      </DCSection>

      {/* Tradeoff notes */}
      <DCSection
        id="notes"
        title="Tradeoffs"
        subtitle="What you gain and lose with each"
      >
        <DCArtboard id="note-a" label="A · Original"
          width={340} height={280} style={{background: '#fffaf0'}}>
          <div style={{padding: 24, fontFamily: 'Inter, system-ui',
            fontSize: 12.5, lineHeight: 1.55, color: '#2d2418', height: '100%',
            boxSizing: 'border-box', display: 'flex', flexDirection: 'column'}}>
            <div style={{fontSize: 11, fontWeight: 700, color: '#8a7355',
              letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10}}>
              A · Original
            </div>
            <div style={{fontWeight: 600, color: '#1a4d2e', marginBottom: 6}}>+ Pros</div>
            <p style={{margin: '0 0 12px'}}>Familiar iOS pattern. Strong hierarchy.
              Easy to find on quick glance.</p>
            <div style={{fontWeight: 600, color: '#7a3a1f', marginBottom: 6}}>− Cons</div>
            <p style={{margin: 0}}>~70px of vertical real estate gone. Title is
              redundant with bottom modnav. Two-line block plus padding.</p>
          </div>
        </DCArtboard>

        <DCArtboard id="note-b" label="B · Collapsing"
          width={340} height={280} style={{background: '#fffaf0'}}>
          <div style={{padding: 24, fontFamily: 'Inter, system-ui',
            fontSize: 12.5, lineHeight: 1.55, color: '#2d2418', height: '100%',
            boxSizing: 'border-box', display: 'flex', flexDirection: 'column'}}>
            <div style={{fontSize: 11, fontWeight: 700, color: '#8a7355',
              letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10}}>
              B · Collapsing ★ my pick
            </div>
            <div style={{fontWeight: 600, color: '#1a4d2e', marginBottom: 6}}>+ Pros</div>
            <p style={{margin: '0 0 12px'}}>Best of both. Strong anchor at rest,
              reclaims space when you start working. Native iOS feel. No info
              lost.</p>
            <div style={{fontWeight: 600, color: '#7a3a1f', marginBottom: 6}}>− Cons</div>
            <p style={{margin: 0}}>Slight implementation cost (scroll listener +
              interpolation). Sticky bar adds visual weight on collapse.</p>
          </div>
        </DCArtboard>

        <DCArtboard id="note-c" label="C · Compact"
          width={340} height={280} style={{background: '#fffaf0'}}>
          <div style={{padding: 24, fontFamily: 'Inter, system-ui',
            fontSize: 12.5, lineHeight: 1.55, color: '#2d2418', height: '100%',
            boxSizing: 'border-box', display: 'flex', flexDirection: 'column'}}>
            <div style={{fontSize: 11, fontWeight: 700, color: '#8a7355',
              letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10}}>
              C · Compact
            </div>
            <div style={{fontWeight: 600, color: '#1a4d2e', marginBottom: 6}}>+ Pros</div>
            <p style={{margin: '0 0 12px'}}>Most efficient — content starts
              ~50px higher. Subtitle becomes a real signal-carrying badge
              ("3 waiting" stands out).</p>
            <div style={{fontWeight: 600, color: '#7a3a1f', marginBottom: 6}}>− Cons</div>
            <p style={{margin: 0}}>Breaks iOS large-title convention. Module
              name only visible in bottom pill — works if users learn the
              system, less forgiving for first-runs.</p>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
