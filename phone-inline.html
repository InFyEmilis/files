  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<script type="text/babel" data-presets="env,react">
// Components for Mecca chat — Rail, Inbox, ChatPane
const { useState, useMemo, useEffect, useRef, useLayoutEffect } = React;
const D = window.MeccaData;

// ── Iconography (inline SVG so we don't depend on lucide) ────────────────────
const Icon = ({ d, size = 16, stroke = 1.6, fill = 'none', className = '' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
    strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>
    {d}
  </svg>
);
const I = {
  msg:    (p) => <Icon {...p} d={<><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.6-.8L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/></>} />,
  check:  (p) => <Icon {...p} d={<><rect x="3" y="3" width="18" height="18" rx="3"/><path d="m9 12 2 2 4-4"/></>} />,
  cart:   (p) => <Icon {...p} d={<><path d="M2 3h2l3 12h13l3-9H6.5"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></>} />,
  alert:  (p) => <Icon {...p} d={<><path d="M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></>} />,
  user:   (p) => <Icon {...p} d={<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />,
  search: (p) => <Icon {...p} d={<><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></>} />,
  plus:   (p) => <Icon {...p} d={<><path d="M12 5v14M5 12h14"/></>} />,
  chev:   (p) => <Icon {...p} d={<><path d="m6 9 6 6 6-6"/></>} />,
  more:   (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>} />,
  pin:    (p) => <Icon {...p} d={<><path d="M12 17v5"/><path d="M9 10.76V6h6v4.76l3 3.24v3H6v-3z"/></>} />,
  panelL: (p) => <Icon {...p} d={<><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="m16 15-3-3 3-3"/></>} />,
  panelR: (p) => <Icon {...p} d={<><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="m13 9 3 3-3 3"/></>} />,
  send:   (p) => <Icon {...p} d={<><path d="M22 2 11 13"/><path d="m22 2-7 20-4-9-9-4 20-7z"/></>} />,
  paper:  (p) => <Icon {...p} d={<><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></>} />,
  smile:  (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></>} />,
  mic:    (p) => <Icon {...p} d={<><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v2a7 7 0 0 0 14 0v-2"/><path d="M12 19v3"/></>} />,
  phone:  (p) => <Icon {...p} d={<><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></>} />,
  video:  (p) => <Icon {...p} d={<><path d="m22 8-6 4 6 4V8z"/><rect x="2" y="6" width="14" height="12" rx="2"/></>} />,
  info:   (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>} />,
  filter: (p) => <Icon {...p} d={<><path d="M3 6h18"/><path d="M7 12h10"/><path d="M11 18h2"/></>} />,
  link:   (p) => <Icon {...p} d={<><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></>} />,
  reply:  (p) => <Icon {...p} d={<><path d="M9 17 4 12l5-5"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></>} />,
  sparkles: (p) => <Icon {...p} d={<><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6 7.7 7.7M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></>} />,
  dot:    (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="3" fill="currentColor"/></>} fill="currentColor" />,
};

// ── Type config: glyphs + tonal hues for the type accent system ──────────────
const TYPE_CFG = {
  'project':     { Glyph: I.msg,   label: 'Project',     hue: 220, name: 'Project Chat' },
  'task':        { Glyph: I.check, label: 'Task',        hue: 155, name: 'Task' },
  'procurement': { Glyph: I.cart,  label: 'Procurement', hue: 35,  name: 'Procurement' },
  'site-issue':  { Glyph: I.alert, label: 'Site Issue',  hue: 0,   name: 'Site Issue' },
  'direct':      { Glyph: I.user,  label: 'Direct',      hue: 270, name: 'Direct' },
};

// Avatar — initials chip with deterministic hue
function Avatar({ p, size = 32, ring = false }) {
  const hue = p.hue ?? 220;
  const bg = `oklch(0.42 0.06 ${hue})`;
  const fg = `oklch(0.96 0.02 ${hue})`;
  return (
    <div
      className={'mc-avatar' + (ring ? ' mc-avatar--ring' : '')}
      style={{ width: size, height: size, background: bg, color: fg, fontSize: Math.round(size * 0.36) }}
      title={p.name}
    >
      {p.avatar}
    </div>
  );
}

function StackedAvatars({ people, max = 3, size = 22 }) {
  const visible = people.slice(0, max);
  return (
    <div className="mc-avatar-stack" style={{ paddingRight: (people.length - 1) * 6 }}>
      {visible.map((p, i) => (
        <div key={p.name} style={{ marginLeft: i === 0 ? 0 : -6, zIndex: max - i }}>
          <Avatar p={p} size={size} ring />
        </div>
      ))}
      {people.length > max && (
        <div className="mc-avatar mc-avatar--more" style={{ width: size, height: size, marginLeft: -6, fontSize: 9 }}>
          +{people.length - max}
        </div>
      )}
    </div>
  );
}

// Tiny priority dot (P1/P2). P3/none renders nothing.
function PriorityDot({ level }) {
  if (level === 'p1') return <span className="mc-pdot mc-pdot--p1" title="Critical" />;
  if (level === 'p2') return <span className="mc-pdot mc-pdot--p2" title="High" />;
  return null;
}

// ── Project Bubble Rail ──────────────────────────────────────────────────────
function ProjectBubbleRail({ variant, projects, selectedProjectId, selectedMode, onSelectProject, onSelectDirect, onToggleVariant }) {
  // variant: 'rail' (icons only), 'expanded' (icons + name), 'collapsed' (search-style)
  const collapsed = variant === 'collapsed';
  const expanded = variant === 'expanded';

  const sections = useMemo(() => {
    const critical = projects.filter(p => p.priorityLevel === 'critical');
    const active = projects.filter(p => p.priorityLevel === 'high' || (p.priorityLevel === 'normal' && p.unreadMessages > 0));
    const quiet = projects.filter(p => p.priorityLevel === 'normal' && p.unreadMessages === 0);
    return [
      { label: 'Critical', items: critical },
      { label: 'Active',   items: active },
      { label: 'Quiet',    items: quiet },
    ].filter(s => s.items.length);
  }, [projects]);

  const dmUnread = D.getGlobalDMs().reduce((s, c) => s + c.unreadCount, 0);

  if (collapsed) {
    return (
      <aside className="mc-rail mc-rail--collapsed">
        <div className="mc-rail__brand">
          <div className="mc-logo">M</div>
        </div>
        <button className="mc-rail__expand" onClick={() => onToggleVariant('rail')} title="Expand sidebar">
          <I.panelR size={16} />
        </button>
      </aside>
    );
  }

  return (
    <aside className={'mc-rail ' + (expanded ? 'mc-rail--expanded' : 'mc-rail--rail')}>
      <div className="mc-rail__brand">
        <div className="mc-logo">M</div>
        {expanded && <span className="mc-rail__brandname">Mecca</span>}
        <div style={{flex:1}} />
        {expanded && (
          <button className="mc-iconbtn" onClick={() => onToggleVariant('rail')} title="Collapse to rail">
            <I.panelL size={16} />
          </button>
        )}
        {!expanded && (
          <button className="mc-rail__expand-mini" onClick={() => onToggleVariant('expanded')} title="Expand">
            <I.panelR size={14} />
          </button>
        )}
      </div>

      <div className="mc-rail__scroll">
        <button
          className={'mc-rail__row mc-rail__row--dm' + (selectedMode === 'direct' ? ' is-selected' : '')}
          onClick={onSelectDirect}
        >
          <div className="mc-rail__bubble mc-rail__bubble--dm">
            <I.user size={18} />
            {dmUnread > 0 && <span className="mc-rail__badge">{dmUnread}</span>}
          </div>
          {expanded && <span className="mc-rail__name">Direct messages</span>}
          {expanded && dmUnread > 0 && <span className="mc-rail__count">{dmUnread}</span>}
        </button>

        <div className="mc-rail__divider" />

        {sections.map(section => (
          <div key={section.label} className="mc-rail__section">
            {expanded && <div className="mc-rail__section-label">{section.label}</div>}
            {!expanded && <div className="mc-rail__section-tick" title={section.label} />}
            {section.items.map(p => {
              const isSel = selectedMode === 'project' && selectedProjectId === p.id;
              const unread = D.getTotalUnread(p.id);
              const bk = D.getUnreadBreakdown(p.id);
              const chips = [
                { key: 'project',     count: bk.project,         hue: 220, Glyph: I.msg,   title: 'Project messages' },
                { key: 'task',        count: bk.task,            hue: 155, Glyph: I.check, title: 'Tasks' },
                { key: 'procurement', count: bk.procurement,     hue: 35,  Glyph: I.cart,  title: 'Procurement' },
                { key: 'site-issue',  count: bk['site-issue'],   hue: 0,   Glyph: I.alert, title: 'Site issues' },
              ];
              const visibleChips = chips.filter(c => c.count > 0);
              return (
                <button
                  key={p.id}
                  className={'mc-rail__row' + (isSel ? ' is-selected' : '')}
                  onClick={() => onSelectProject(p.id)}
                  title={!expanded ? p.name : undefined}
                >
                  <div
                    className="mc-rail__bubble"
                    style={{
                      background: isSel ? 'var(--mc-accent)' : 'var(--mc-surface)',
                      color: isSel ? 'var(--mc-accent-fg)' : 'var(--mc-text-mute)',
                    }}
                  >
                    {p.initials}
                    {p.priorityLevel === 'critical' && <span className="mc-rail__priority mc-rail__priority--crit" />}
                    {p.priorityLevel === 'high' && <span className="mc-rail__priority mc-rail__priority--high" />}
                    {!expanded && unread > 0 && <span className="mc-rail__badge">{unread > 9 ? '9+' : unread}</span>}
                  </div>
                  {expanded && (
                    <div className="mc-rail__rowtext">
                      <span className="mc-rail__name">{p.name}</span>
                      {visibleChips.length > 0 ? (
                        <div className="mc-rail__chips">
                          {visibleChips.map(c => (
                            <span
                              key={c.key}
                              className="mc-rail__chip"
                              title={`${c.count} ${c.title.toLowerCase()}`}
                              style={{
                                background: `oklch(0.32 0.08 ${c.hue})`,
                                color: `oklch(0.92 0.04 ${c.hue})`,
                                borderColor: `oklch(0.42 0.08 ${c.hue} / 0.5)`,
                              }}
                            >
                              <c.Glyph size={10} stroke={2} />
                              {c.count}
                            </span>
                          ))}
                        </div>
                      ) : (
                        <span className="mc-rail__reason">{p.priorityReason}</span>
                      )}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        ))}
      </div>

      <div className="mc-rail__foot">
        <button className="mc-iconbtn" title="New conversation">
          <I.plus size={16} />
        </button>
        <Avatar p={D.participants.you} size={28} ring />
      </div>
    </aside>
  );
}

window.MC = window.MC || {};
window.MC.ProjectBubbleRail = ProjectBubbleRail;
window.MC.Avatar = Avatar;
window.MC.StackedAvatars = StackedAvatars;
window.MC.PriorityDot = PriorityDot;
window.MC.TYPE_CFG = TYPE_CFG;
window.MC.I = I;

</script>
<script type="text/babel" data-presets="env,react">
// Phone-specific components — projects list, project inbox, chat
const { useState: pUseState, useMemo: pUseMemo, useEffect: pUseEffect, useRef: pUseRef, useLayoutEffect: pUseLayoutEffect } = React;
window.MC = window.MC || {};
const PD = window.MeccaData;
// Lazy proxies — components-rail.jsx may not have populated window.MC yet
// when this script evaluates (Babel script order isn't guaranteed).
const PMC = new Proxy({}, { get: (_, k) => window.MC[k] });
const PI = new Proxy({}, { get: (_, k) => (window.MC.I || {})[k] });
const PTYPE = new Proxy({}, { get: (_, k) => (window.MC.TYPE_CFG || {})[k] });

// Back-arrow icon
const BackIcon = (p) => (
  <svg width={p.size||20} height={p.size||20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M15 18 9 12l6-6" />
  </svg>
);

// ── Projects list (top-level inbox / "rail" replaced by full screen) ─────────
function PhoneProjects({ projects, onOpenProject, onOpenDM, dmUnread }) {
  const [search, setSearch] = pUseState('');
  const [filter, setFilter] = pUseState('all');

  const sections = pUseMemo(() => {
    let list = projects;
    if (filter === 'critical') list = list.filter(p => p.priorityLevel === 'critical');
    if (filter === 'unread') list = list.filter(p => PD.getTotalUnread(p.id) > 0);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(p => p.name.toLowerCase().includes(q));
    }
    const critical = list.filter(p => p.priorityLevel === 'critical');
    const active = list.filter(p => p.priorityLevel === 'high' || (p.priorityLevel === 'normal' && PD.getTotalUnread(p.id) > 0));
    const quiet = list.filter(p => p.priorityLevel === 'normal' && PD.getTotalUnread(p.id) === 0);
    return [
      { label: 'Critical', items: critical },
      { label: 'Active',   items: active },
      { label: 'Quiet',    items: quiet },
    ].filter(s => s.items.length);
  }, [projects, filter, search]);

  return (
    <div className="ph">
      <div className="ph-top">
        <div className="ph-top__title">
          <h1>Mecca</h1>
          <div className="ph-top__sub">Projects · {projects.length}</div>
        </div>
        <div className="ph-top__actions">
          <button className="ph-top__btn"><PI.search size={18} /></button>
          <button className="ph-top__btn"><PI.more size={18} /></button>
        </div>
      </div>

      <div className="ph-search">
        <PI.search size={14} />
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search projects…" />
      </div>

      <div className="ph-filter">
        {['all','critical','unread'].map(f => (
          <button key={f} className={'ph-filter__pill' + (filter===f?' is-active':'')} onClick={() => setFilter(f)}>
            {f === 'all' ? 'All projects' : f === 'critical' ? 'Critical' : 'Unread'}
          </button>
        ))}
      </div>

      <div className="ph-scroll">
        {/* Direct messages entry */}
        <button className="ph-conv" onClick={onOpenDM}>
          <div className="ph-conv__lead">
            <div className="ph-conv__icon" style={{ '--h': 270 }}>
              <PI.user size={18} stroke={1.8} />
            </div>
            {dmUnread > 0 && <span className="ph-conv__unreaddot" />}
          </div>
          <div className="ph-conv__body">
            <div className="ph-conv__top">
              <span className={'ph-conv__title' + (dmUnread>0?' is-unread':'')}>Direct messages</span>
            </div>
            <div className="ph-conv__sub">
              <span className="ph-conv__preview">Person-to-person · not linked to a project</span>
              {dmUnread > 0 && <span className="ph-conv__badge">{dmUnread}</span>}
            </div>
          </div>
        </button>

        {sections.map(s => (
          <div key={s.label}>
            <div className="ph-section">
              <span>{s.label}</span>
              <span className="ph-section__count">{s.items.length}</span>
            </div>
            <div className="ph-projlist">
              {s.items.map(p => {
                const unread = PD.getTotalUnread(p.id);
                const bk = PD.getUnreadBreakdown(p.id);
                const chips = [
                  { key: 'project',     count: bk.project,         hue: 220, Glyph: PI.msg,   title: 'messages' },
                  { key: 'task',        count: bk.task,            hue: 155, Glyph: PI.check, title: 'tasks' },
                  { key: 'procurement', count: bk.procurement,     hue: 35,  Glyph: PI.cart,  title: 'procurement' },
                  { key: 'site-issue',  count: bk['site-issue'],   hue: 0,   Glyph: PI.alert, title: 'site issues' },
                ].filter(c => c.count > 0);
                return (
                  <button key={p.id} className="ph-projcard" onClick={() => onOpenProject(p.id)}>
                    <div className="ph-projcard__bubble">
                      {p.initials}
                      {p.priorityLevel === 'critical' && <span className="ph-projcard__priority ph-projcard__priority--crit" />}
                      {p.priorityLevel === 'high' && <span className="ph-projcard__priority ph-projcard__priority--high" />}
                    </div>
                    <div className="ph-projcard__body">
                      <div className="ph-projcard__topline">
                        <span className="ph-projcard__name">{p.name}</span>
                        {unread > 0 && <span className="ph-conv__badge">{unread > 9 ? '9+' : unread}</span>}
                      </div>
                      <span className="ph-projcard__reason">{p.priorityReason}</span>
                      {chips.length > 0 && (
                        <div className="ph-projcard__chips">
                          {chips.map(c => (
                            <span key={c.key} className="ph-chip"
                              style={{
                                background: `oklch(0.32 0.08 ${c.hue})`,
                                color: `oklch(0.92 0.04 ${c.hue})`,
                                borderColor: `oklch(0.42 0.08 ${c.hue} / 0.5)`,
                              }}
                              title={`${c.count} ${c.title}`}>
                              <c.Glyph size={10} stroke={2} />
                              {c.count}
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <PhoneTabbar active="messages" />
    </div>
  );
}

// ── Project inbox (conversations within a project) ──────────────────────────
function PhoneProjectInbox({ project, onBack, onOpenConv }) {
  const [search, setSearch] = pUseState('');
  const [filter, setFilter] = pUseState('all');

  const all = pUseMemo(() => PD.getProjectConversations(project.id), [project.id]);
  const filtered = pUseMemo(() => {
    let list = all;
    if (filter === 'unread') list = list.filter(c => c.unreadCount > 0);
    if (filter === 'flagged') list = list.filter(c => c.priorityLevel === 'p1' || c.priorityLevel === 'p2');
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(c => c.title.toLowerCase().includes(q) || c.lastMessage.toLowerCase().includes(q));
    }
    return list;
  }, [all, filter, search]);

  const SECTIONS = [
    { type: 'project', label: 'Project chat' },
    { type: 'task', label: 'Tasks' },
    { type: 'procurement', label: 'Procurement' },
    { type: 'site-issue', label: 'Site issues' },
  ];
  const grouped = pUseMemo(() => {
    const m = new Map();
    for (const c of filtered) {
      if (!m.has(c.type)) m.set(c.type, []);
      m.get(c.type).push(c);
    }
    return m;
  }, [filtered]);
  const projDMs = pUseMemo(() => PD.getProjectDMs(project.id), [project.id]);

  return (
    <div className="ph">
      <div className="ph-top">
        <button className="ph-top__back" onClick={onBack}><BackIcon /></button>
        <div className="ph-top__title">
          <h1>{project.name}</h1>
          <div className="ph-top__sub">{project.manager} · {project.priorityReason}</div>
        </div>
        <div className="ph-top__actions">
          <button className="ph-top__btn"><PI.more size={18} /></button>
        </div>
      </div>

      <div className="ph-projhead">
        <div className="ph-projhead__row">
          <div className="ph-projhead__bubble">{project.initials}</div>
          <div style={{flex:1, minWidth:0}}>
            <div className="ph-projhead__name">{project.name}</div>
            <div className="ph-projhead__sub">{project.manager}</div>
          </div>
        </div>
        <div className="ph-projhead__stats">
          {project.unreadMessages > 0 && (
            <span className="ph-stat"><span className="ph-statdot ph-statdot--blue" />{project.unreadMessages} unread</span>
          )}
          {project.overdueTasks > 0 && (
            <span className="ph-stat"><span className="ph-statdot ph-statdot--red" />{project.overdueTasks} overdue</span>
          )}
          {project.dueTodayTasks > 0 && (
            <span className="ph-stat"><span className="ph-statdot ph-statdot--amber" />{project.dueTodayTasks} due today</span>
          )}
          {project.hasWaitingApproval && (
            <span className="ph-stat"><span className="ph-statdot ph-statdot--violet" />waiting approval</span>
          )}
        </div>
        <div className="ph-projnav">
          <button className="ph-projnav__btn is-primary"><PI.panelR size={15} /><span>Open</span></button>
          <button className="ph-projnav__btn"><PI.paper size={15} /><span>Files</span></button>
          <button className="ph-projnav__btn">
            <PI.check size={15} /><span>Tasks</span>
            {project.overdueTasks > 0 && <span className="ph-projnav__btn-count">{project.overdueTasks}</span>}
          </button>
          <button className="ph-projnav__btn"><PI.cart size={15} /><span>Procure</span></button>
        </div>
      </div>

      <div className="ph-search">
        <PI.search size={14} />
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search conversations…" />
      </div>

      <div className="ph-filter">
        {['all','unread','flagged'].map(f => (
          <button key={f} className={'ph-filter__pill' + (filter===f?' is-active':'')} onClick={() => setFilter(f)}>
            {f === 'all' ? 'All' : f === 'unread' ? 'Unread' : 'Flagged'}
          </button>
        ))}
      </div>

      <div className="ph-scroll">
        {SECTIONS.map(def => {
          const items = grouped.get(def.type) || [];
          if (!items.length) return null;
          const cfg = PTYPE[def.type];
          const Glyph = cfg.Glyph;
          const unread = items.reduce((s,c) => s + c.unreadCount, 0);
          return (
            <div key={def.type}>
              <div className="ph-section">
                <span style={{ color: `oklch(0.7 0.12 ${cfg.hue})`, display:'inline-flex' }}><Glyph size={12} stroke={2} /></span>
                <span>{def.label}</span>
                <span className="ph-section__count">{items.length}</span>
                {unread > 0 && <span className="ph-section__unread">{unread}</span>}
              </div>
              {items.map(c => <PhoneConvRow key={c.id} conv={c} onClick={() => onOpenConv(c.id)} />)}
            </div>
          );
        })}
        {projDMs.length > 0 && (
          <div>
            <div className="ph-section">
              <span style={{color:`oklch(0.7 0.12 270)`, display:'inline-flex'}}><PI.user size={12} stroke={2} /></span>
              <span>Direct messages</span>
              <span className="ph-section__count">{projDMs.length}</span>
            </div>
            {projDMs.map(c => <PhoneConvRow key={c.id} conv={c} onClick={() => onOpenConv(c.id)} />)}
          </div>
        )}
      </div>

      <button className="ph-fab" title="New conversation"><PI.plus size={22} /></button>
      <PhoneTabbar active="messages" />
    </div>
  );
}

function PhoneConvRow({ conv, onClick }) {
  const cfg = PTYPE[conv.type] || PTYPE.project;
  const Glyph = (cfg && cfg.Glyph) || (window.MC.I && window.MC.I.msg);
  const hasUnread = conv.unreadCount > 0;
  const isDM = conv.type === 'direct';
  return (
    <button className="ph-conv" onClick={onClick}>
      <div className="ph-conv__lead">
        {isDM && conv.participants[0] ? (
          <PMC.Avatar p={conv.participants[0]} size={40} />
        ) : (
          <div className="ph-conv__icon" style={{ '--h': cfg.hue }}>
            <Glyph size={16} stroke={1.8} />
          </div>
        )}
        {hasUnread && <span className="ph-conv__unreaddot" />}
      </div>
      <div className="ph-conv__body">
        <div className="ph-conv__top">
          <span className={'ph-conv__title' + (hasUnread?' is-unread':'')}>{conv.title}</span>
          {conv.priorityLevel === 'p1' && <PMC.PriorityDot level="p1" />}
          {conv.priorityLevel === 'p2' && <PMC.PriorityDot level="p2" />}
          <span className="ph-conv__time">{PD.fmtRelative(conv.timestamp)}</span>
        </div>
        <div className="ph-conv__sub">
          <span className="ph-conv__preview">
            {!isDM && conv.lastSender && <span className="ph-conv__sender">{conv.lastSender.split(' ')[0]}: </span>}
            {conv.lastMessage}
          </span>
          {hasUnread && <span className="ph-conv__badge">{conv.unreadCount > 9 ? '9+' : conv.unreadCount}</span>}
        </div>
        {conv.subtitle && <div className="ph-conv__meta">{conv.subtitle}</div>}
      </div>
    </button>
  );
}

// ── Chat screen ──────────────────────────────────────────────────────────────
function PhoneChat({ conv, project, onBack }) {
  const [composed, setComposed] = pUseState([]);
  const [text, setText] = pUseState('');
  const scrollRef = pUseRef(null);
  const cfg = PTYPE[conv.type] || PTYPE.project;
  const Glyph = (cfg && cfg.Glyph) || (window.MC.I && window.MC.I.msg);
  const others = conv.participants.filter(p => p.name !== 'You');

  const baseMsgs = pUseMemo(() => PD.getMessages(conv.id), [conv.id]);
  const allMsgs = pUseMemo(() => groupPhone(baseMsgs.concat(composed)), [baseMsgs, composed]);

  pUseLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [allMsgs.length, conv.id]);

  const send = () => {
    const t = text.trim();
    if (!t) return;
    setComposed(prev => [...prev, {
      id: 'u' + Date.now(), content: t, sender: PD.participants.you, timestamp: new Date(), isOwn: true,
    }]);
    setText('');
  };

  return (
    <div className="ph">
      <div className="ph-chat">
        <div className="ph-chat__head">
          <button className="ph-chat__head-back" onClick={onBack}><BackIcon /></button>
          {conv.type === 'direct' && conv.participants[0] ? (
            <PMC.Avatar p={conv.participants[0]} size={36} ring />
          ) : (
            <div className="ph-chat__head-icon" style={{ '--h': cfg.hue }}>
              <Glyph size={16} stroke={1.8} />
            </div>
          )}
          <div className="ph-chat__head-text">
            <div className="ph-chat__head-title">
              <span style={{overflow:'hidden', textOverflow:'ellipsis'}}>{conv.title}</span>
              {conv.priorityLevel === 'p1' && <span className="ph-chat__head-pill ph-chat__head-pill--crit">Critical</span>}
              {conv.priorityLevel === 'p2' && <span className="ph-chat__head-pill ph-chat__head-pill--high">High</span>}
            </div>
            <div className="ph-chat__head-sub">
              {conv.type !== 'direct' && project && <span>{project.name}</span>}
              {others.length > 0 && conv.type !== 'direct' && <span>· {others.length + 1} members</span>}
              {conv.type === 'direct' && conv.participants[0] && <span>{conv.participants[0].role}</span>}
            </div>
          </div>
          <div className="ph-chat__head-actions">
            <button className="ph-chat__head-btn"><PI.phone size={17} /></button>
            <button className="ph-chat__head-btn"><PI.video size={17} /></button>
          </div>
        </div>

        {conv.subtitle && conv.type !== 'project' && conv.type !== 'direct' && (
          <div className="ph-chat__context" style={{ '--h': cfg.hue }}>
            <div className="ph-chat__context-icon"><Glyph size={13} stroke={2} /></div>
            <div className="ph-chat__context-body">
              <div className="ph-chat__context-title">{conv.title}</div>
              <div className="ph-chat__context-meta">{conv.subtitle}</div>
            </div>
          </div>
        )}

        <div className="ph-chat__stream" ref={scrollRef}>
          {allMsgs.map(m => <PhoneMsg key={m.id} m={m} />)}
        </div>

        <div className="ph-composer">
          <button className="ph-composer__btn"><PI.plus size={20} /></button>
          <div className="ph-composer__field">
            <input
              style={{flex:1, border:0, outline:'none', background:'transparent', color:'var(--mc-text)', fontSize:14}}
              value={text}
              onChange={e=>setText(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); send(); } }}
              placeholder="Message…"
            />
            <PI.smile size={18} />
          </div>
          {text.trim() ? (
            <button className="ph-composer__send" onClick={send}><PI.send size={16} /></button>
          ) : (
            <button className="ph-composer__btn"><PI.mic size={20} /></button>
          )}
        </div>
      </div>
    </div>
  );
}

function groupPhone(msgs) {
  const out = [];
  for (let i = 0; i < msgs.length; i++) {
    const m = msgs[i], prev = msgs[i-1], next = msgs[i+1];
    const sP = prev && prev.sender.name === m.sender.name && (m.timestamp - prev.timestamp) < 5*60_000;
    const sN = next && next.sender.name === m.sender.name && (next.timestamp - m.timestamp) < 5*60_000;
    let pos;
    if (!sP && !sN) pos = 'single';
    else if (!sP && sN) pos = 'first';
    else if (sP && sN) pos = 'middle';
    else pos = 'last';
    let showDay = !prev || prev.timestamp.toDateString() !== m.timestamp.toDateString();
    out.push({ ...m, pos, showDay });
  }
  return out;
}

function PhoneMsg({ m }) {
  const own = m.isOwn;
  const showAvatar = !own && (m.pos === 'last' || m.pos === 'single');
  const showName = !own && (m.pos === 'first' || m.pos === 'single');
  return (
    <>
      {m.showDay && <div className="ph-day"><span>{PD.fmtDay(m.timestamp)}</span></div>}
      <div className={'ph-msg ph-msg--' + (own?'own':'other') + ' ph-msg--' + m.pos}>
        <div className="ph-msg__avatar">
          {showAvatar && !own && <PMC.Avatar p={m.sender} size={24} />}
        </div>
        <div className="ph-msg__col">
          {showName && (
            <div className="ph-msg__name">
              <span style={{ color: `oklch(0.78 0.08 ${m.sender.hue ?? 220})` }}>{m.sender.name}</span>
              <span className="ph-msg__role">{m.sender.role}</span>
            </div>
          )}
          <div className="ph-msg__bubble">
            <span>{m.content}</span>
            <span className="ph-msg__time">{PD.fmtTime(m.timestamp)}</span>
          </div>
        </div>
      </div>
    </>
  );
}

// ── Direct messages list ─────────────────────────────────────────────────────
function PhoneDMs({ onBack, onOpenConv }) {
  const dms = PD.getGlobalDMs();
  return (
    <div className="ph">
      <div className="ph-top">
        <button className="ph-top__back" onClick={onBack}><BackIcon /></button>
        <div className="ph-top__title">
          <h1>Direct messages</h1>
          <div className="ph-top__sub">Person-to-person</div>
        </div>
      </div>
      <div className="ph-search">
        <PI.search size={14} />
        <input placeholder="Search people…" />
      </div>
      <div className="ph-scroll">
        {dms.map(c => <PhoneConvRow key={c.id} conv={c} onClick={() => onOpenConv(c.id)} />)}
      </div>
      <PhoneTabbar active="messages" />
    </div>
  );
}

function PhoneTabbar({ active }) {
  const items = [
    { id: 'messages', label: 'Messages', icon: PI.msg },
    { id: 'tasks', label: 'Tasks', icon: PI.check },
    { id: 'projects', label: 'Projects', icon: PI.panelR },
    { id: 'me', label: 'Me', icon: PI.user },
  ];
  return (
    <div className="ph-tabbar">
      {items.map(i => {
        const I = i.icon;
        return (
          <button key={i.id} className={'ph-tab' + (active===i.id?' is-active':'')}>
            <I size={20} stroke={active===i.id?2.2:1.6} />
            <span>{i.label}</span>
          </button>
        );
      })}
    </div>
  );
}

window.PMC = { PhoneProjects, PhoneProjectInbox, PhoneChat, PhoneDMs };

</script>
<script type="text/babel" data-presets="env,react">
// Phone app shell — manages screen navigation
const { useState: aUseState, useMemo: aUseMemo, useEffect: aUseEffect } = React;
const AD = window.MeccaData;
const APMC = window.PMC;

function PhoneApp() {
  // Screens: 'projects' | 'projectInbox' | 'chat' | 'dms'
  const [screen, setScreen] = aUseState('projects');
  const [projectId, setProjectId] = aUseState(null);
  const [convId, setConvId] = aUseState(null);

  // Theme — read from URL/initial; default dark
  aUseEffect(() => {
    document.documentElement.setAttribute('data-theme', 'dark');
  }, []);

  const projects = AD.PRIORITY_PROJECTS;
  const project = aUseMemo(() => projects.find(p => p.id === projectId), [projectId]);
  const conv = aUseMemo(() => AD.CONVERSATIONS.find(c => c.id === convId), [convId]);
  const dmUnread = aUseMemo(() => AD.getGlobalDMs().reduce((s, c) => s + c.unreadCount, 0), []);

  if (screen === 'chat' && conv) {
    return (
      <APMC.PhoneChat
        conv={conv}
        project={project}
        onBack={() => {
          if (conv.type === 'direct' && !conv.projectId) setScreen('dms');
          else setScreen('projectInbox');
        }}
      />
    );
  }
  if (screen === 'projectInbox' && project) {
    return (
      <APMC.PhoneProjectInbox
        project={project}
        onBack={() => setScreen('projects')}
        onOpenConv={(id) => { setConvId(id); setScreen('chat'); }}
      />
    );
  }
  if (screen === 'dms') {
    return (
      <APMC.PhoneDMs
        onBack={() => setScreen('projects')}
        onOpenConv={(id) => {
          setConvId(id);
          setProjectId(null);
          setScreen('chat');
        }}
      />
    );
  }
  return (
    <APMC.PhoneProjects
      projects={projects}
      dmUnread={dmUnread}
      onOpenProject={(id) => {
        setProjectId(id);
        // Pre-select first conversation in project for fast chat preview
        setConvId(AD.autoSelectConv(id));
        setScreen('projectInbox');
      }}
      onOpenDM={() => setScreen('dms')}
    />
  );
}

window.PhoneApp = PhoneApp;

</script>
<script type="text/babel" data-presets="env,react">

const D = window.MeccaData;
const { PhoneProjects, PhoneProjectInbox, PhoneChat, PhoneDMs } = window.PMC;
const projects = D.PRIORITY_PROJECTS;
const dmUnread = D.getGlobalDMs().reduce((s, c) => s + c.unreadCount, 0);

// Set dark theme on root
document.documentElement.setAttribute('data-theme', 'dark');

// Pick representative entities for each frame
const criticalProj = projects.find(p => p.priorityLevel === 'critical') || projects[0];
const projConvs = D.getProjectConversations(criticalProj.id);
const projChat = projConvs.find(c => c.type === 'project') || projConvs[0];
const taskConv = projConvs.find(c => c.type === 'task');
const dmConv = D.getGlobalDMs()[0];

// Wrap each phone screen in an iOS device frame.
function PhoneFrame({ children }) {
  return (
    <IOSDevice width={390} height={844} dark={true}>
      <div className="phone-mount" data-theme="dark">{children}</div>
    </IOSDevice>
  );
}

// Stub onBack/onOpen for static design frames — they can no-op or
// log; this is a layout/design comp, not the live shell.
const noop = () => {};

function App() {
  return (
    <DesignCanvas>
      <DCSection id="phone" title="Mobile · iPhone" subtitle="Mecca chat — phone form factor (390 × 844, dark)">
        <DCArtboard id="projects" label="Projects" width={390} height={844}>
          <PhoneFrame>
            <PhoneProjects
              projects={projects}
              dmUnread={dmUnread}
              onOpenProject={noop}
              onOpenDM={noop}
            />
          </PhoneFrame>
        </DCArtboard>

        <DCArtboard id="project-inbox" label="Project inbox" width={390} height={844}>
          <PhoneFrame>
            <PhoneProjectInbox
              project={criticalProj}
              onBack={noop}
              onOpenConv={noop}
            />
          </PhoneFrame>
        </DCArtboard>

        <DCArtboard id="chat-project" label="Project chat" width={390} height={844}>
          <PhoneFrame>
            <PhoneChat
              conv={projChat}
              project={criticalProj}
              onBack={noop}
            />
          </PhoneFrame>
        </DCArtboard>

        {taskConv && (
          <DCArtboard id="chat-task" label="Task chat" width={390} height={844}>
            <PhoneFrame>
              <PhoneChat
                conv={taskConv}
                project={criticalProj}
                onBack={noop}
              />
            </PhoneFrame>
          </DCArtboard>
        )}

        <DCArtboard id="dms" label="Direct messages" width={390} height={844}>
          <PhoneFrame>
            <PhoneDMs onBack={noop} onOpenConv={noop} />
          </PhoneFrame>
        </DCArtboard>

        {dmConv && (
          <DCArtboard id="chat-dm" label="DM chat" width={390} height={844}>
            <PhoneFrame>
              <PhoneChat
                conv={dmConv}
                project={null}
                onBack={noop}
              />
            </PhoneFrame>
          </DCArtboard>
        )}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
